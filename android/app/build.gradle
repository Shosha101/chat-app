plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}
dependencies {
    implementation platform('com.google.firebase:firebase-bom:33.7.0') // Firebase BOM for dependency versions
    implementation 'com.google.firebase:firebase-analytics' // Include Analytics (or other services you use)
    // Add other Firebase services as needed
    implementation 'com.google.firebase:firebase-auth' // Example: Firebase Auth
    implementation 'com.google.firebase:firebase-firestore' // Example: Firestore
}

android {
    namespace = "com.example.chatify"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.example.chatify"
        minSdk = 23 // Set to the minimum SDK version required by Firebase
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }


    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
